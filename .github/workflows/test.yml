name: Self-test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  # Check mode — static + security. No LLM, no API key.
  check-good:
    name: check · good-skill (expect pass)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        id: run
        with:
          mode: check
          path: tests/fixtures/good-skill
          comment: false
      - run: |
          echo "any-failed=${{ steps.run.outputs.any-failed }}"
          echo "skills-count=${{ steps.run.outputs.skills-count }}"

  check-bad:
    name: check · bad-skill (informational, low score expected)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        id: run
        with:
          mode: check
          path: tests/fixtures/bad-skill
          comment: false
          fail-threshold: "0"   # informational; don't fail the job
      - run: |
          echo "any-failed=${{ steps.run.outputs.any-failed }}"

  # Security gate must trip on the malicious fixture.
  check-malicious:
    name: check · malicious-skill (expect BLOCK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        id: run
        continue-on-error: true
        with:
          mode: check
          path: tests/fixtures/malicious-skill
          comment: false
          security-gate: "true"
      - name: Expect security failure
        run: |
          if [ "${{ steps.run.outputs.any-failed }}" != "true" ]; then
            echo "::error::Expected security-gate to fail on malicious-skill, got any-failed='${{ steps.run.outputs.any-failed }}'"
            exit 1
          fi

  # Judge mode hits the backend. Asserts the LLM rubric actually ran and
  # that build-comment.sh renders valid markdown (written to step summary,
  # since push events have no PR to comment on).
  judge-backend:
    name: judge · good-skill (backend LLM)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        id: run
        with:
          mode: judge
          path: tests/fixtures/good-skill
          comment: true
      - name: Assert judge_score present
        env:
          RESULTS: ${{ steps.run.outputs.results }}
        run: |
          score=$(printf '%s' "$RESULTS" | jq -r '.[0].judge.judge_score // "null"')
          err=$(printf '%s' "$RESULTS" | jq -r '.[0].error // "null"')
          if [ "$score" = "null" ] || [ -z "$score" ] || [ "$score" = "0" ]; then
            echo "::error::judge_score missing or zero — judge call likely failed"
            echo "Error field: $err"
            echo "Full results: $RESULTS"
            exit 1
          fi
          echo "judge_score=$score"
          echo "total-cost=${{ steps.run.outputs.total-cost }}"

  # Optimize mode — exercises the rewrite path end-to-end.
  optimize-backend:
    name: optimize · good-skill (backend LLM)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        id: run
        with:
          mode: optimize
          path: tests/fixtures/good-skill
          comment: true
      - name: Assert optimized_content present
        env:
          RESULTS_FILE: ${{ steps.run.outputs.results-file }}
        run: |
          orig=$(jq -r '.[0].optimize.original_score // "null"' "$RESULTS_FILE")
          opt=$(jq -r '.[0].optimize.optimized_score // "null"' "$RESULTS_FILE")
          content_len=$(jq -r '.[0].optimize.optimized_content | length' "$RESULTS_FILE")
          err=$(jq -r '.[0].error // "null"' "$RESULTS_FILE")
          echo "original_score=$orig optimized_score=$opt content_length=$content_len"
          if [ "$orig" = "null" ] || [ "$opt" = "null" ] || [ "$content_len" -lt 100 ]; then
            echo "::error::optimize output missing or truncated"
            echo "Error field: $err"
            exit 1
          fi

  # BYOK mode — exercises sklab CLI. Runs only when ANTHROPIC_API_KEY is set.
  judge-byok:
    name: judge · good-skill (BYOK)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - name: Detect BYOK key
        id: detect
        env:
          KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$KEY" ]; then
            echo "have=true" >> "$GITHUB_OUTPUT"
          else
            echo "have=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ANTHROPIC_API_KEY secret not set — BYOK job is a no-op"
          fi
      - uses: ./
        if: steps.detect.outputs.have == 'true'
        id: run
        with:
          mode: judge
          api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          path: tests/fixtures/good-skill
          comment: false
      - name: Assert judge_score present (BYOK)
        if: steps.detect.outputs.have == 'true'
        env:
          RESULTS: ${{ steps.run.outputs.results }}
        run: |
          score=$(printf '%s' "$RESULTS" | jq -r '.[0].judge.judge_score // "null"')
          err=$(printf '%s' "$RESULTS" | jq -r '.[0].error // "null"')
          if [ "$score" = "null" ] || [ -z "$score" ] || [ "$score" = "0" ]; then
            echo "::error::BYOK judge_score missing or zero"
            echo "Error field: $err"
            echo "Full results: $RESULTS"
            exit 1
          fi
          echo "judge_score=$score (BYOK)"
